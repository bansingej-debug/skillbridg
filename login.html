<!DOCTYPE html>
<html>
<head>
  <title>SkillBridge Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .login-container {
      background: #1e293b;
      padding: 40px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .logo {
      width: 80px;
      margin-bottom: 15px;
    }

    h2 {
      margin-bottom: 20px;
      color: #38bdf8;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #2563eb;
    }

    .signup-link {
      margin-top: 15px;
      font-size: 14px;
    }

    .signup-link a {
      color: #38bdf8;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>

</head>

<body>

<div class="login-container">

  <!-- LOGO -->
  <img src="logo.png" alt="Logo" class="logo">

  <h2>SkillBridge Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Sign In</button>

  <div class="signup-link">
    New user? <a href="signup.html">Sign Up</a>
  </div>

</div>

<script>
function login() {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  let storedEmail = localStorage.getItem("email");
  let storedPassword = localStorage.getItem("password");

  if(email === storedEmail && password === storedPassword) {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "skillbridge.html";
  } else {
    alert("Invalid email or password");
  }
}
</script>

</body>
</html>
